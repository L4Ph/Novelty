name: Auto Release

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  release:
    # PRがマージされた場合のみ実行
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-tags: true
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Calculate new version
        id: calculate_version
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            // PRのラベルを取得
            const labels = context.payload.pull_request.labels.map(label => label.name);
            console.log('PR Labels:', labels);

            // バージョンアップタイプを判定
            let bumpType = 'default';
            if (labels.includes('pride')) {
              bumpType = 'proud';
              console.log('Detected "pride" label - will bump PROUD version');
            } else if (labels.includes('shame')) {
              bumpType = 'shame';
              console.log('Detected "shame" label - will bump SHAME version');
            } else {
              console.log('No pride/shame label - will bump DEFAULT version');
            }

            // pubspec.yamlから現在のバージョンを読み込み
            const pubspecPath = path.join(process.cwd(), 'pubspec.yaml');
            const pubspecContent = fs.readFileSync(pubspecPath, 'utf8');

            const versionMatch = pubspecContent.match(/^version:\s*(.+)$/m);
            if (!versionMatch) {
              throw new Error('Could not find version in pubspec.yaml');
            }

            const currentVersion = versionMatch[1].trim();
            console.log('Current version:', currentVersion);

            // バージョンをパース (x.y.z+build)
            const [semver, buildStr] = currentVersion.split('+');
            const [proudStr, defaultStr, shameStr] = semver.split('.');

            let proud = parseInt(proudStr, 10) || 0;
            let defaultVal = parseInt(defaultStr, 10) || 0;
            let shame = parseInt(shameStr, 10) || 0;
            let build = parseInt(buildStr, 10) || 0;

            // Pride Versioningに基づいてバージョンを更新
            switch (bumpType) {
              case 'proud':
                proud += 1;
                defaultVal = 0;
                shame = 0;
                break;
              case 'default':
                defaultVal += 1;
                shame = 0;
                break;
              case 'shame':
                shame += 1;
                break;
            }

            // ビルド番号を常にインクリメント
            build += 1;

            const newVersion = `${proud}.${defaultVal}.${shame}+${build}`;
            const semverVersion = `${proud}.${defaultVal}.${shame}`;
            const tagName = `v${proud}.${defaultVal}.${shame}`;

            console.log('New version:', newVersion);
            console.log('Tag name:', tagName);

            // pubspec.yamlを更新
            const updatedContent = pubspecContent.replace(
              /^version:\s*.+$/m,
              `version: ${newVersion}`
            );
            fs.writeFileSync(pubspecPath, updatedContent);
            console.log('Updated pubspec.yaml');

            // 出力を設定
            core.setOutput('new_version', newVersion);
            core.setOutput('semver_version', semverVersion);
            core.setOutput('build_number', build.toString());
            core.setOutput('tag_name', tagName);

            return {
              new_version: newVersion,
              semver_version: semverVersion,
              build_number: build,
              tag_name: tagName
            };

      - name: Commit version bump
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pubspec.yaml
          git commit -m "[skip ci] chore: bump version to ${{ steps.calculate_version.outputs.new_version }}"
          git push origin main
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push tag
        run: |
          git tag ${{ steps.calculate_version.outputs.tag_name }} ${{ steps.commit.outputs.sha }}
          git push origin ${{ steps.calculate_version.outputs.tag_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          cache: true

      - name: Get Flutter packages
        run: mise run get

      - name: Run code generation
        run: mise run codegen

      - name: Decode Keystore and create key.properties
        run: |
          # Decode keystore
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks

          # Create key.properties
          cat > android/app/key.properties << EOF
          storePassword=${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=upload-keystore.jks
          EOF

      - name: Build Android AAB
        run: |
          mise exec -- flutter build appbundle --release \
            --build-name=${{ steps.calculate_version.outputs.semver_version }} \
            --build-number=${{ steps.calculate_version.outputs.build_number }}
        env:
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Build Android APK (split per ABI)
        run: |
          mise exec -- flutter build apk --release --split-per-abi \
            --build-name=${{ steps.calculate_version.outputs.semver_version }} \
            --build-number=${{ steps.calculate_version.outputs.build_number }}
        env:
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ steps.calculate_version.outputs.tag_name }} \
            --title "Release ${{ steps.calculate_version.outputs.semver_version }}" \
            --generate-notes \
            build/app/outputs/bundle/release/app-release.aab \
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk \
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk \
            build/app/outputs/flutter-apk/app-x86_64-release.apk
