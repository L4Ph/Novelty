name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "バージョン番号 (例: 0.7.0)"
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Generate GitHub App Token
        id: generate_token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.generate_token.outputs.token }}
          fetch-tags: true
          fetch-depth: 0

      - name: Calculate new version
        id: calculate_version
        run: |
          CURRENT_VERSION=$(yq '.version' pubspec.yaml)
          if [[ "$CURRENT_VERSION" == *"+"* ]]; then
            BUILD_NUMBER=$(echo "$CURRENT_VERSION" | cut -d'+' -f2)
          else
            BUILD_NUMBER=0
          fi
          NEW_BUILD_NUMBER=$((BUILD_NUMBER + 1))
          NEW_VERSION="${{ inputs.version }}+${NEW_BUILD_NUMBER}"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "build_number=$NEW_BUILD_NUMBER" >> "$GITHUB_OUTPUT"
          echo "tag_name=v${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          echo "Generated new version: $NEW_VERSION"

      - name: Check if tag exists
        id: check_tag
        run: |
          if git rev-parse "${{ steps.calculate_version.outputs.tag_name }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${{ steps.calculate_version.outputs.tag_name }} already exists"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Tag ${{ steps.calculate_version.outputs.tag_name }} does not exist"
          fi

      - name: Update pubspec.yaml version
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          yq -i '.version = "${{ steps.calculate_version.outputs.new_version }}"' pubspec.yaml
          echo "Updated pubspec.yaml with version: ${{ steps.calculate_version.outputs.new_version }}"

      - name: Commit version bump
        if: steps.check_tag.outputs.exists == 'false'
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pubspec.yaml
          git commit -m "[skip ci] chore: bump version to ${{ steps.calculate_version.outputs.new_version }}"
          git push origin main
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
        env:
          GITHUB_TOKEN: ${{ steps.generate_token.outputs.token }}

      - name: Create and push tag
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          git tag ${{ steps.calculate_version.outputs.tag_name }} ${{ steps.commit.outputs.sha }}
          git push origin ${{ steps.calculate_version.outputs.tag_name }}
        env:
          GITHUB_TOKEN: ${{ steps.generate_token.outputs.token }}

      - name: Setup mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          cache: true

      - name: Setup Android SDK
        uses: android-actions/setup-android@651bceb6f9ca583f16b8d75b62c36ded2ae6fc9c # v4.0.0

      - name: Get Flutter packages
        run: mise run get

      - name: Run code generation
        run: mise run codegen

      - name: Decode Keystore and create key.properties
        run: |
          # Decode keystore
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks

          # Create key.properties
          cat > android/app/key.properties << EOF
          storePassword=${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=upload-keystore.jks
          EOF

      - name: Build Android AAB
        run: |
          mise exec -- flutter build appbundle --release \
            --build-name=${{ inputs.version }} \
            --build-number=${{ steps.calculate_version.outputs.build_number }}
        env:
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Build Android APK (split per ABI)
        run: |
          mise exec -- flutter build apk --release --split-per-abi \
            --build-name=${{ inputs.version }} \
            --build-number=${{ steps.calculate_version.outputs.build_number }}
        env:
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ steps.calculate_version.outputs.tag_name }} \
            --title "Release ${{ inputs.version }}" \
            --generate-notes \
            build/app/outputs/bundle/release/app-release.aab \
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk \
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk \
            build/app/outputs/flutter-apk/app-x86_64-release.apk
